<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nour Says</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .container { padding-top: 60px; }
  img { width: 220px; max-width: 80%; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
  h1 { font-size: 34px; margin: 22px 0; }
  button {
    padding: 16px 42px; font-size: 18px; font-weight: bold;
    border: none; border-radius: 30px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white; cursor: pointer; transition: 0.3s;
  }
  button:active { transform: scale(0.96); }
  .hint { margin-top: 16px; font-size: 13px; color: #9cc0ee; }
  .confetti { position: absolute; width: 10px; height: 10px; top: -20px; }
</style>
</head>
<body>
  <div class="container">
    <img src="nour-logo.png" alt="NOUR">
    <h1>Nour Says</h1>
    <button onclick="start()">▶ Start Experience</button>
    <div class="hint">اضغط الزر عشان نور يرحّب بلجنة المناقشة</div>
  </div>
<script>
function start() {
  var en = new SpeechSynthesisUtterance("Welcome to the graduation discussion. This is Nour.");
  en.lang = "en-US";
  var ar = new SpeechSynthesisUtterance("أهلاً بكم في مناقشة مشروع التخرج. أنا نور.");
  ar.lang = "ar-EG";
  en.onend = function(){ speechSynthesis.speak(ar); };
  speechSynthesis.cancel();
  speechSynthesis.speak(en);
  for (var i = 0; i < 60; i++) {
    var c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = "hsl(" + (Math.random()*360) + ",100%,55%)";
    c.style.animation = "fall " + (Math.random()*3+2) + "s linear forwards";
    document.body.appendChild(c);
    (function(el){ setTimeout(function(){ el.remove(); }, 5000); })(c);
  }
}
</script>
<style>
@keyframes fall { to { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
</style>
</body>
</html>
